<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <title>Connexion - {{ config.site_name if config else 'EST Social' }}</title>
    <style>
        body { background-color: #fff; color: #202124; font-family: 'Roboto', arial, sans-serif; }
        .google-card {
            border: 1px solid #dadce0;
            border-radius: 8px;
            max-width: 450px;
            width: 100%;
        }
        .g-input {
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 13px 15px;
            font-size: 16px;
            transition: border 0.2s;
        }
        .g-input:focus {
            border: 2px solid #1a73e8;
            outline: none;
            padding: 12px 14px;
        }
        .btn-primary {
            background-color: #1a73e8;
            color: white;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn-primary:hover { background-color: #1b66c9; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="google-card p-10 text-center animate__animated animate__fadeIn">

        <div class="mb-6">
            <span class="text-2xl font-semibold tracking-tight">
                <span class="text-[#4285F4]">E</span><span class="text-[#EA4335]">S</span><span class="text-[#FBBC05]">T</span>
                <span class="text-[#34A853] ml-1">Social</span>
            </span>
        </div>

        <h1 class="text-2xl font-normal mb-2">Connexion</h1>
        <p class="text-base text-gray-700 mb-8 font-normal">Utilisez votre compte pour continuer</p>

        <form action="/auth" method="POST" class="text-left space-y-6">

            <div class="relative">
                <input type="text" name="username" placeholder="Email ou nom d'utilisateur" required
                       class="g-input w-full">
            </div>

            <div class="relative">
                <input type="password" name="password" placeholder="Saisissez votre mot de passe" required
                       class="g-input w-full">
            </div>

            <div class="text-sm font-medium text-[#1a73e8] hover:underline cursor-pointer inline-block">
                Mot de passe oublié ?
            </div>

            <div class="mt-10 mb-4 text-sm text-gray-600 leading-relaxed">
                Pas votre ordinateur ? Utilisez le mode Invité pour vous connecter en privé.
                <a href="#" class="text-[#1a73e8] font-medium">En savoir plus</a>
            </div>

            <div class="flex justify-between items-center pt-6">
                <button type="button" class="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-2 py-2 rounded transition">
                    Créer un compte
                </button>
                <button type="submit" class="btn-primary text-sm">
                    Suivant
                </button>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold italic">
                <i class="fa-solid fa-shield-halved mr-1"></i> Admin Access Ready
            </p>
        </div>
    </div>

</body>
</html>
