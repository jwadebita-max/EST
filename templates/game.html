<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <title>EST Quest - Unités d'Intelligence</title>
    <style>
        body { background: radial-gradient(circle at center, #0f172a, #020617); }
        .hp-bar { transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shake { animation: headShake 0.5s; }
        .mic-active { animation: pulse 1s infinite; color: #ef4444 !important; border-color: #ef4444 !important; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .boss-glow { filter: hue-rotate(280deg) brightness(1.3) drop-shadow(0 0 30px #f87171) !important; }
    </style>
</head>
<body class="min-h-screen text-white font-sans overflow-hidden">

    <nav class="p-6 flex justify-between items-center">
        <a href="/" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center border border-white/10 hover:bg-white/10 transition-all">
            <i class="fa-solid fa-house text-sm"></i>
        </a>
        <div class="text-center">
            <span id="nav-level" class="block text-[10px] font-black uppercase tracking-[0.3em] text-blue-400">Niveau {{ curr_user.game_level }}</span>
            <span id="nav-xp" class="text-xs font-bold text-gray-500"><span id="xp-val">{{ curr_user.exp_points }}</span> XP</span>
        </div>
        <div class="w-10"></div>
    </nav>

    <main class="max-w-md mx-auto px-6 pt-10 text-center">

        <div id="battle-zone" class="relative mb-12">
            <div id="damage-hit" class="absolute top-0 left-1/2 -translate-x-1/2 text-3xl font-black text-red-500 opacity-0 z-50">-50 HP</div>

            <div id="monster-container" class="animate__animated animate__bounceIn">
                <img id="monster-img" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Quest"
                     class="w-40 h-40 mx-auto drop-shadow-[0_0_30px_rgba(59,130,246,0.3)] transition-all duration-500">

                <h3 id="monster-name" class="mt-4 font-black uppercase italic tracking-tighter text-xl text-blue-200">...</h3>

                <div class="w-48 h-2 bg-gray-800 rounded-full mx-auto mt-4 overflow-hidden border border-white/5">
                    <div id="hp-fill" class="hp-bar h-full bg-gradient-to-r from-red-500 to-orange-500" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div id="game-ui" class="animate__animated animate__fadeInUp">
            <div id="quiz-card" class="bg-white/5 backdrop-blur-xl p-8 rounded-[3rem] border border-white/10 shadow-2xl">
                <p class="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-2">Traduisez ce mot</p>
                <h2 id="target-word" class="text-4xl font-black mb-8 tracking-tighter text-white">...</h2>

                <div class="relative group mb-6">
                    <input id="user-input" type="text" autocomplete="off" placeholder="Votre réponse..."
                           class="w-full bg-black/20 border-2 border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold text-xl transition-all">
                    <div id="feedback" class="hidden mt-4 p-4 rounded-2xl text-sm font-bold"></div>
                </div>

                <button id="btn-check" onclick="checkAnswer()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                    Vérifier <i class="fa-solid fa-bolt ml-2"></i>
                </button>
            </div>
        </div>

        <div id="boss-ui" class="hidden animate__animated animate__zoomIn">
            <div class="bg-red-500/10 backdrop-blur-xl p-8 rounded-[3rem] border border-red-500/30 shadow-2xl">
                <p class="text-[10px] font-black uppercase text-red-400 tracking-widest mb-2">🔥 ÉPREUVE DU BOSS (VOCAL)</p>
                <h2 id="boss-target-word" class="text-4xl font-black mb-8 tracking-tighter text-white">...</h2>

                <button id="btn-mic" onclick="startVoiceRecognition()" class="w-24 h-24 bg-white/5 rounded-full border-4 border-white/10 flex items-center justify-center mx-auto mb-4 hover:bg-white/10 transition-all">
                    <i id="mic-icon" class="fa-solid fa-microphone text-3xl text-white"></i>
                </button>
                <p id="boss-status" class="text-[10px] font-black text-gray-500 uppercase italic">Cliquez sur le micro et parlez</p>
            </div>
        </div>

        <div id="win-screen" class="hidden animate__animated animate__zoomIn">
            <div class="bg-yellow-500/10 border border-yellow-500/20 p-10 rounded-[3rem]">
                <i class="fa-solid fa-crown text-6xl text-yellow-500 mb-4 drop-shadow-lg animate__animated animate__pulse animate__infinite"></i>
                <h2 class="text-2xl font-black mb-2 uppercase tracking-widest">Victoire !</h2>
                <div class="space-y-1 mb-6">
                    <p id="xp-gain" class="text-blue-400 font-black text-xl">+10 Unités</p>
                    <p id="rank-name" class="text-gray-400 text-xs font-bold uppercase tracking-widest">Calcul du rang...</p>
                </div>
                <button onclick="nextMonster()" class="bg-white text-black px-10 py-4 rounded-xl font-black uppercase text-xs hover:bg-gray-200 transition-all">Continuer la Quête</button>
            </div>
        </div>

    </main>

    <audio id="snd-hit" src="https://www.myinstants.com/media/sounds/minecraft_hit.mp3"></audio>
    <audio id="snd-error" src="https://www.myinstants.com/media/sounds/error_CD6sS96.mp3"></audio>

    <script>
        let currentMonster = null;
        let monsterHp = 100;
        let isWaiting = false;

        async function spawnMonster() {
            try {
                isWaiting = false;
                const res = await fetch('/game/spawn_monster', {method: 'POST'});
                const data = await res.json();

                console.log("Données reçues de l'IA:", data);

                if (!data) return;

                // Correction du bug 'undefined'
                const displayWord = data.word || "Défi";
                currentMonster = data;
                currentMonster.word = displayWord;

                monsterHp = 100;
                document.getElementById('hp-fill').style.width = "100%";
                document.getElementById('monster-img').style.opacity = "1";
                document.getElementById('monster-img').style.transform = "scale(1)";

                if (data.is_boss) {
                    document.getElementById('game-ui').classList.add('hidden');
                    document.getElementById('boss-ui').classList.remove('hidden');
                    document.getElementById('boss-target-word').innerText = displayWord;
                    document.getElementById('monster-img').classList.add('boss-glow');
                    document.getElementById('monster-name').innerText = "🔥 BOSS: " + (data.name || "Inconnu");
                } else {
                    document.getElementById('boss-ui').classList.add('hidden');
                    document.getElementById('game-ui').classList.remove('hidden');
                    document.getElementById('target-word').innerText = displayWord;
                    document.getElementById('monster-img').classList.remove('boss-glow');
                    document.getElementById('monster-name').innerText = (data.name || "Monstre");
                }

                document.getElementById('monster-img').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${data.name || 'Bot'}_${Math.random()}`;
            } catch (e) { console.error("Spawn error:", e); }
        }

        async function checkAnswer() {
            if (isWaiting || !currentMonster) return;
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            const correct = (currentMonster.translation || "").toLowerCase();

            if (!val) return;

            if (val === correct) {
                applyHit(50);
                input.value = "";
            } else {
                handleError();
            }
        }

        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Microphone non supporté.");

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; // Langue cible

            const micIcon = document.getElementById('mic-icon');
            const status = document.getElementById('boss-status');

            recognition.onstart = () => {
                micIcon.parentElement.classList.add('mic-active');
                status.innerText = "L'AI écoute... Prononcez : " + currentMonster.word;
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                console.log("L'AI a entendu:", transcript);

                if (transcript.includes(currentMonster.word.toLowerCase())) {
                    applyHit(100);
                } else {
                    status.innerText = "Entendu: '" + transcript + "' (Réessayez)";
                    document.getElementById('snd-error').play();
                }
            };

            recognition.onend = () => {
                micIcon.parentElement.classList.remove('mic-active');
            };

            recognition.start();
        }

        function applyHit(dmg) {
            monsterHp -= dmg;
            document.getElementById('snd-hit').play();
            showHitEffect(dmg);
            document.getElementById('hp-fill').style.width = monsterHp + "%";

            if (monsterHp <= 0) {
                victory();
            } else {
                document.getElementById('monster-img').classList.add('shake');
                setTimeout(() => document.getElementById('monster-img').classList.remove('shake'), 500);
            }
        }

        function showHitEffect(dmg) {
            const hit = document.getElementById('damage-hit');
            hit.innerText = `-${dmg} HP`;
            hit.style.opacity = "1";
            hit.classList.add('animate__fadeOutUp');
            setTimeout(() => {
                hit.classList.remove('animate__fadeOutUp');
                hit.style.opacity = "0";
            }, 800);
        }

        function handleError() {
            isWaiting = true;
            document.getElementById('snd-error').play();
            document.getElementById('monster-container').classList.add('shake');
            const fb = document.getElementById('feedback');
            fb.innerHTML = `<p class="text-red-400 uppercase text-[10px] font-black">Échec</p>
                            <p class="text-white text-sm">La correction : <span class="text-green-400 underline">${currentMonster.translation}</span></p>`;
            fb.classList.remove('hidden');
            setTimeout(() => {
                fb.classList.add('hidden');
                document.getElementById('monster-container').classList.remove('shake');
                document.getElementById('user-input').value = "";
                isWaiting = false;
            }, 2500);
        }

        async function victory() {
            isWaiting = true;
            document.getElementById('monster-img').style.transform = "scale(0) rotate(180deg)";
            document.getElementById('monster-img').style.opacity = "0";

            try {
                const res = await fetch('/game/win', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        word: currentMonster.word,
                        translation: currentMonster.translation
                    })
                });
                const data = await res.json();

                document.getElementById('nav-level').innerText = `Niveau ${data.new_level}`;
                document.getElementById('xp-val').innerText = data.new_xp;
                document.getElementById('rank-name').innerText = data.rank;

                setTimeout(() => {
                    document.getElementById('game-ui').classList.add('hidden');
                    document.getElementById('boss-ui').classList.add('hidden');
                    document.getElementById('win-screen').classList.remove('hidden');
                }, 600);
            } catch (e) { console.error("Win error:", e); }
        }

        function nextMonster() {
            document.getElementById('win-screen').classList.add('hidden');
            spawnMonster();
        }

        window.onload = spawnMonster;
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
